<body>
    <script>

        let str1 = "моя строка";

        console.log(typeof str1, attemp);

        console.log(typeof 5, typeof(new Number));

        let div = "7"/"2";
        console.log(div);

        let sum1 = "5" + 3;
        console.log(sum1);

        let sum2 = Number("5") + 5;
        console.log(sum2);

        let sum3 = parseFloat("5.2");
        console.log(sum3);

        let sum4 = "5" + 3;
        console.log(sum4);

        let string4 = String(123);
        console.log(string4)

        // преобразование boolean
        let b3 = Boolean(1);
        console.log(b3);
        let b4 = Boolean(0);
        console.log(b4);

        let b5 = Boolean("Привет");
        console.log(b5);
        

    </script>
